<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cauã Souza | Portfólio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 30px;
  background: transparent;
  transition: 0.3s;
}

nav.ativo {
  background: rgba(2,6,23,0.8);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.foto {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 3px solid #38bdf8;
  object-fit: cover;
}

.hero h1 {
  margin-top: 15px;
  font-size: 38px;
}

#typing {
  color: #38bdf8;
  margin-top: 10px;
}

/* BOTÃO */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: linear-gradient(45deg, #38bdf8, #0ea5e9);
  border-radius: 12px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* SEÇÕES */
section {
  padding: 80px 20px;
  text-align: center;
}

/* PROJETOS */
.projetos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 260px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

/* ANIMAÇÃO */
.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}
</style>
</head>

<body>

<nav id="nav">
  <a href="#home">Início</a>
  <a href="#sobre">Sobre</a>
  <a href="#projetos">Projetos</a>
  <a href="#contato">Contato</a>
</nav>

<div class="hero" id="home">
  <img src="foto.jpg" class="foto">
  <h1>Cauã Souza</h1>
  <p id="typing"></p>
  <a href="#projetos" class="btn">Ver projetos</a>
</div>

<section id="sobre" class="hidden">
  <h2>Sobre mim</h2>
  <p>Buscando minha primeira oportunidade na área de tecnologia.</p>
</section>

<section id="projetos" class="hidden">
  <h2>Projetos</h2>

  <div class="projetos">
    <div class="card">
      <h3>To-Do Avançado</h3>
      <a href="https://cauasouza7.github.io/todo-list-avancado">Ver</a>
    </div>

    <div class="card">
      <h3>Calculadora Pro</h3>
      <a href="https://cauasouza7.github.io/calculadora-pro">Ver</a>
    </div>

    <div class="card">
      <h3>LoveMatch</h3>
      <a href="https://cauasouza7.github.io/love-match">Ver</a>
    </div>
  </div>
</section>

<section id="contato" class="hidden">
  <h2>Contato</h2>
  <p>Email: cauavitorsouzaleite@gmail.com</p>
  <p>Telefone: (87)999174859</p>
</section>

<footer>
  <p>© 2026 - Cauã Souza</p>
</footer>

<script>
// NAVBAR efeito
window.addEventListener("scroll", () => {
  const nav = document.getElementById("nav");
  nav.classList.toggle("ativo", window.scrollY > 50);
});

// ANIMAÇÃO SCROLL
const elements = document.querySelectorAll(".hidden");

window.addEventListener("scroll", () => {
  elements.forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight - 50) {
      el.classList.add("show");
    }
  });
});

// EFEITO DIGITAÇÃO
const texto = "Desenvolvedor em formação 💻";
let i = 0;

function digitar() {
  if (i < texto.length) {
    document.getElementById("typing").innerHTML += texto.charAt(i);
    i++;
    setTimeout(digitar, 50);
  }
}

digitar();
</script>

</body>
</html>
