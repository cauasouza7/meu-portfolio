<!DOCTYPE html>
<html>
<head>
  <title>Meu Portfólio</title>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }

    .card {
      background-color: #1e293b;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }

    button {
      background-color: #22c55e;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #16a34a;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Olá, eu sou Cauã 👋</h1>
    <p>Estudante de Desenvolvimento de Sistemas</p>
    <p>Cursos: Banco de Dados, Informática e TI</p>

    <button onclick="mostrarMensagem()">Clique aqui</button>
  </div>

  <script>
    function mostrarMensagem() {
      alert("Bem-vindo ao meu primeiro projeto 🚀");
    }
  </script>

</body>
</html>
