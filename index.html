<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cauã Souza | Dev</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: Arial;
  background: #020617;
  color: white;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 15px;
  text-align: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #0f172a, #020617);
}

.hero h1 {
  font-size: 40px;
}

.hero span {
  color: #38bdf8;
}

/* PROJETOS */
.projetos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
  padding: 60px 20px;
}

.card {
  width: 300px;
  background: #0f172a;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.btn {
  display: inline-block;
  margin: 5px;
  padding: 8px 12px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  background: #38bdf8;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<nav>
  <strong>Cauã Dev</strong>
</nav>

<div class="hero">
  <h1>Olá, eu sou <span>Cauã</span> 👋</h1>
  <p>Desenvolvedor focado em criar aplicações web modernas</p>
</div>

<section class="projetos">

  <div class="card">
    <img src="https://picsum.photos/300/200?1">
    <div class="card-content">
      <h3>To-Do Avançado</h3>
      <a class="btn" href="https://cauasouza7.github.io/todo-list-avancado">Demo</a>
      <a class="btn" href="https://github.com/cauasouza7">GitHub</a>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/200?2">
    <div class="card-content">
      <h3>Calculadora Pro</h3>
      <a class="btn" href="https://cauasouza7.github.io/calculadora-pro">Demo</a>
      <a class="btn" href="https://github.com/cauasouza7">GitHub</a>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/200?3">
    <div class="card-content">
      <h3>LoveMatch</h3>
      <a class="btn" href="https://cauasouza7.github.io/love-match">Demo</a>
      <a class="btn" href="https://github.com/cauasouza7">GitHub</a>
    </div>
  </div>

</section>

<footer>
  <p>© 2026 - Cauã Souza</p>
</footer>

</body>
</html>
